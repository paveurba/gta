services:
  mongodb:
    image: mongo:7
    container_name: gta-rebar-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20

  mysql:
    image: mysql:8.0
    container_name: gta-rebar-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-gta_rebar}
      MYSQL_USER: ${DB_USER:-gta}
      MYSQL_PASSWORD: ${DB_PASSWORD:-gta_password}
    ports:
      - "${MYSQL_EXPOSE_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  altv-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gta-rebar-server
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "${GAME_PORT:-7788}:7788/tcp"
      - "${GAME_PORT:-7788}:7788/udp"
    environment:
      MONGODB: mongodb://mongodb:27017
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-gta_rebar}
      DB_USER: ${DB_USER:-gta}
      DB_PASSWORD: ${DB_PASSWORD:-gta_password}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}

volumes:
  mongodb_data:
  mysql_data:
