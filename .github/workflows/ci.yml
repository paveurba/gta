# TEST-02 / TEST-01: compile + unit tests. Root postinstall runs altv-pkg + build:docker — not suitable
# for a lightweight Ubuntu runner; we use --ignore-scripts, then compile:ts and vitest.
name: CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    compile:
        name: TypeScript compile
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Compile TypeScript (Sucrase)
              run: pnpm run compile:ts

            - name: Unit tests (Vitest)
              run: pnpm test
